# Railway build + run config.
# Overrides Railpack's auto-detection so the Fastify backend runs and serves
# the built SPA from dist/ (single-origin deployment).
[build]
builder = "RAILPACK"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
