name: migrate

on:
  push:
    branches: [main]
    paths:
      - 'server/migrations/**.sql'
      - 'scripts/apply-migrations.sh'
      - '.github/workflows/migrate.yml'
  workflow_dispatch:

concurrency:
  group: migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    # GitHub-hosted: applies migrations to the Railway database over its
    # public proxy URL. (Previously ran on the self-hosted `praxis-db` box
    # against a local Docker Postgres; that runner went offline and stranded
    # migrations, so the database now lives on Railway.)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Railway Postgres public connection string (proxy host:port). Stored as
      # a repo secret so it never lands in the tree. See README for rotation.
      DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply pending migrations
        run: ./scripts/apply-migrations.sh

      - name: Report state
        run: psql "$DATABASE_URL" -c "SELECT filename, applied_at FROM schema_migrations ORDER BY applied_at DESC LIMIT 20;"
