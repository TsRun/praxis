name: migrate

on:
  push:
    branches: [main]
    paths:
      - 'server/migrations/**.sql'
      - 'scripts/apply-migrations.sh'
      - '.github/workflows/migrate.yml'
  workflow_dispatch:

concurrency:
  group: migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: [self-hosted, praxis-db]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # `shell: bash` on this Windows runner resolves to WSL's bash.exe,
      # which can't see _work\_temp Windows paths. Custom shell paths with
      # a drive letter are rejected. So we use cmd as the wrapper and
      # call git-bash directly with the script file (no inline heredocs).
      - name: Apply pending migrations
        shell: cmd
        run: '"C:\Program Files\Git\bin\bash.exe" -c "./scripts/apply-migrations.sh"'

      - name: Report state
        shell: cmd
        run: 'docker exec openings-db psql -U openings -d openings -c "SELECT filename, applied_at FROM schema_migrations ORDER BY applied_at DESC LIMIT 20;"'
