name: migrate

# DEPRECATED / DISABLED.
#
# Migrations now apply to the Railway Postgres as part of the deploy, via the
# `preDeployCommand = "npm run migrate"` in railway.toml (a pg-based runner —
# scripts/migrate.ts — that needs no psql and is idempotent). That runs inside
# Railway against the live DATABASE_URL on every deploy.
#
# This workflow targeted a self-hosted Windows runner (`praxis-db`) + a local
# Docker Postgres that is offline, so it only ever failed. Trigger is reduced to
# manual-only so it no longer fails on every push to main. Kept for reference /
# emergency manual runs; delete once the Railway pre-deploy path is trusted.
on:
  workflow_dispatch:

concurrency:
  group: migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: [self-hosted, praxis-db]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Apply pending migrations
        shell: cmd
        run: '"C:\Program Files\Git\bin\bash.exe" -c "./scripts/apply-migrations.sh"'

      - name: Report state
        shell: cmd
        run: 'docker exec openings-db psql -U openings -d openings -c "SELECT filename, applied_at FROM schema_migrations ORDER BY applied_at DESC LIMIT 20;"'
