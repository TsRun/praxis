services:
  postgres:
    image: postgres:16-alpine
    container_name: openings-db
    environment:
      POSTGRES_USER: openings
      POSTGRES_PASSWORD: openings
      POSTGRES_DB: openings
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - openings-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openings -d openings"]
      interval: 2s
      timeout: 2s
      retries: 60
    restart: unless-stopped

volumes:
  openings-pgdata:
